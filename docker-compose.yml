services:
  fms-mcp:
    build: .
    container_name: fms-mcp-local
    user: "1000:1000"
    ports:
      - "18080:8080"
      - "18081:8081"
    volumes:
      - /tmp/fms-test-workspace:/workspace:rw
    environment:
      - WORKSPACE_ROOT=/workspace
      - AUDIT_DIR=/workspace/.fms-mcp/audit
      - AUDIT_ARCHIVE_DIR=/workspace/.fms-mcp/audit-archive
      - SUPERGATEWAY_PORT=8080
      - HEALTH_PORT=8081
      - LOG_LEVEL=debug
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
